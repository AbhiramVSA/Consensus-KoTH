uid = nobody
gid = nogroup
use chroot = no
max connections = 10
pid file = /var/run/rsyncd.pid
log file = /var/log/rsyncd.log

[public]
    path = /srv/rsync/public
    comment = Public KoTH Share
    read only = no
    list = yes
    auth users =
    hosts allow = *
    # No authentication - anonymous write allowed
